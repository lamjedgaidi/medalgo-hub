<a href="{{ algorithm.get_absolute_url }}"
   class="block bg-white rounded-xl border border-slate-200 p-4 hover:border-accent hover:shadow-sm transition">
  <div class="flex items-start justify-between gap-2">
    <h3 class="font-semibold text-accent-ink leading-tight">{{ algorithm.name }}</h3>
    {% if algorithm.official %}
      <span class="text-[10px] uppercase tracking-wide px-1.5 py-0.5 rounded bg-accent/10 text-accent">Official</span>
    {% elif algorithm.verified %}
      <span class="text-[10px] uppercase tracking-wide px-1.5 py-0.5 rounded bg-emerald-50 text-emerald-600">Verified</span>
    {% endif %}
  </div>
  <p class="text-xs text-slate-500 mt-0.5">{{ algorithm.category.label }} · {{ algorithm.get_field_display }}</p>
  <p class="text-sm text-slate-600 mt-2 line-clamp-2">{{ algorithm.blurb }}</p>
  <div class="flex items-center gap-3 mt-3 text-xs text-slate-400">
    <span>★ {{ algorithm.rating }}</span>
    <span>{{ algorithm.installs }} installs</span>
    <span class="ml-auto font-mono text-slate-400">{{ algorithm.author_handle }}</span>
  </div>
</a>
