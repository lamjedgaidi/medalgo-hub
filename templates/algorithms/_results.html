<div id="results">
  <p class="text-xs text-slate-400 mb-3">{{ count }} algorithm{{ count|pluralize }}</p>
  {% if algorithms %}
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-3">
      {% for algorithm in algorithms %}
        {% include "algorithms/_card.html" %}
      {% endfor %}
    </div>
  {% else %}
    <div class="text-center text-slate-400 py-16 border border-dashed border-slate-200 rounded-xl">
      No algorithms match your search.
    </div>
  {% endif %}
</div>
